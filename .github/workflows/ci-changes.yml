---
# Canonical path filter for Python CI. tests.yml and lint.yml duplicate this
# filter inline (reusable workflow_call requires the file on default branch).
name: CI path changes

on:
  workflow_call:
    outputs:
      code:
        description: PR touches Python/integration code or CI that runs Python checks
        value: ${{ jobs.changes.outputs.code }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7.0.0

      - name: Detect code paths
        uses: dorny/paths-filter@v3.0.3
        id: filter
        with:
          filters: |
            code:
              - 'custom_components/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - '.ruff.toml'
              - '.pre-commit-config.yaml'
              - '.github/workflows/tests.yml'
              - '.github/workflows/lint.yml'
              - '.github/workflows/ci-changes.yml'
