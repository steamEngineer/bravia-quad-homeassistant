name: Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: 📦 HACS
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7.0.1"
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"

  hassfest:
    name: 🏠 Hassfest
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7.0.1"
      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"

  forbidden-paths:
    name: 🔒 Forbidden paths
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7.0.1"
        with:
          fetch-depth: 0
      - name: Block private/local artifacts
        run: scripts/forbid_private_commit.sh --ci
