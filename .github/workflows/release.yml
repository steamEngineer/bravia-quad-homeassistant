name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: 📦 Create release archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: ⤵️ Checkout code
        uses: actions/checkout@v6

      - name: 🔢 Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: 📝 Update manifest.json version
        run: python3 scripts/update_manifest_version.py ${{ steps.version.outputs.version }}

      - name: 🔍 Verify version
        run: |
          echo "=== manifest.json ==="
          grep '"version"' custom_components/bravia_quad/manifest.json

      - name: 📦 Create release archive
        working-directory: custom_components/bravia_quad
        run: zip -r ../../bravia_quad.zip .

      - name: 📎 Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          files: bravia_quad.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
