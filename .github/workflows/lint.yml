name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  changes:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/ci-changes.yml

  ruff:
    name: "🧹 Ruff"
    runs-on: "ubuntu-latest"
    needs: [changes]
    if: >-
      github.repository == 'steamEngineer/bravia-quad-homeassistant' &&
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || needs.changes.result != 'failure')
    steps:
      - name: Skip Ruff (no code changes)
        if: >-
          github.event_name == 'pull_request' &&
          needs.changes.outputs.code != 'true'
        run: echo "No testable paths changed; Ruff skipped."

      - name: Checkout the repository
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7.0.0

      - name: Install uv
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv python install 3.14.2

      - name: Lint
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uvx ruff check .

      - name: Format
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uvx ruff format . --check

  ty:
    name: "🔎 Ty"
    runs-on: "ubuntu-latest"
    needs: [changes]
    if: >-
      github.repository == 'steamEngineer/bravia-quad-homeassistant' &&
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || needs.changes.result != 'failure')
    steps:
      - name: Skip Ty (no code changes)
        if: >-
          github.event_name == 'pull_request' &&
          needs.changes.outputs.code != 'true'
        run: echo "No testable paths changed; Ty skipped."

      - name: Checkout the repository
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7.0.0

      - name: Install uv
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv python install 3.14.2

      - name: Install dependencies
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv sync --dev

      - name: Type check
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv run ty check custom_components/bravia_quad
