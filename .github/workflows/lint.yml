name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  ruff:
    name: "🧹 Ruff"
    runs-on: "ubuntu-latest"
    if: github.repository == 'steamEngineer/bravia-quad-homeassistant'
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Lint
        run: uvx ruff check .

      - name: Format
        run: uvx ruff format . --check

  ty:
    name: "🔎 Ty"
    runs-on: "ubuntu-latest"
    if: github.repository == 'steamEngineer/bravia-quad-homeassistant'
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      - name: Type check
        run: uv run ty check custom_components/bravia_quad
