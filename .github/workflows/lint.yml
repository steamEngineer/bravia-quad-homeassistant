name: Lint

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7.0.1

      - name: Detect code paths
        uses: dorny/paths-filter@v4.0.2
        id: filter
        with:
          # Keep filters in sync with .github/workflows/ci-changes.yml
          filters: |
            code:
              - 'custom_components/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - '.ruff.toml'
              - '.pre-commit-config.yaml'
              - '.github/workflows/tests.yml'
              - '.github/workflows/lint.yml'
              - '.github/workflows/ci-changes.yml'

  ruff:
    name: "🧹 Ruff"
    runs-on: "ubuntu-latest"
    needs: [changes]
    if: >-
      github.repository == 'steamEngineer/bravia-quad-homeassistant' &&
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || needs.changes.result != 'failure')
    steps:
      - name: Skip Ruff (no code changes)
        if: >-
          github.event_name == 'pull_request' &&
          needs.changes.outputs.code != 'true'
        run: echo "No testable paths changed; Ruff skipped."

      - name: Checkout the repository
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7.0.1

      - name: Install uv
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv python install

      - name: Lint
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uvx ruff check .

      - name: Format
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uvx ruff format . --check

  ty:
    name: "🔎 Ty"
    runs-on: "ubuntu-latest"
    needs: [changes]
    if: >-
      github.repository == 'steamEngineer/bravia-quad-homeassistant' &&
      always() &&
      !cancelled() &&
      (github.event_name == 'push' || needs.changes.result != 'failure')
    steps:
      - name: Skip Ty (no code changes)
        if: >-
          github.event_name == 'pull_request' &&
          needs.changes.outputs.code != 'true'
        run: echo "No testable paths changed; Ty skipped."

      - name: Checkout the repository
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7.0.1

      - name: Install uv
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv python install

      - name: Install dependencies
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv sync --dev

      - name: Type check
        if: >-
          github.event_name == 'push' ||
          needs.changes.outputs.code == 'true'
        run: uv run ty check custom_components/bravia_quad
