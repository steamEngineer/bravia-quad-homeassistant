# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py313"

extend-exclude = [
    "scripts/capture",
    "scripts/frida",
    "scripts/grpc_auth_gate.py",
    "scripts/grpc_connect_handoff_probe.py",
    "scripts/grpc_diff_getstates_capture.py",
    "scripts/grpc_external_control_probe.py",
    "scripts/grpc_notify_states_field_probe.py",
    "scripts/grpc_playback_probe.py",
    "scripts/grpc_snapshot_coverage.py",
    "scripts/grpc_unmapped_enum_scan.py",
    "scripts/reset_dev_ha_legacy.py",
    "tests/test_analyze_getstates_log.py",
    "tests/test_analyze_grpc_timeline.py",
]

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

[lint.per-file-ignores]
"scripts/*" = [
    "D",       # Don't require docstrings in scripts
    "FBT001",  # Allow boolean positional args in scripts
    "PLR0915", # Allow many statements in scripts (long procedural flows)
    "PLW2901", # Allow loop variable reassignment in scripts
    "S101",    # Allow assert statements in scripts
    "SLF001",  # Allow private member access in scripts
    "T20",     # Allow print statements in scripts
]
"tests/*" = [
    "ARG001",  # Allow unused function arguments (fixtures need to be referenced)
    "D",       # Don't require docstrings in tests
    "FBT001",  # Allow boolean positional args in test helper signatures
    "FBT003",  # Allow boolean positional values in test assertions and mock calls
    "PLR2004", # Allow magic values in tests (common for test assertions)
    "S101",    # Allow assert statements in tests (pytest uses them)
    "S105",    # Allow hardcoded test tokens in credential tests
    "SLF001",  # Allow private member access in tests (needed to set up internal state)
    "TC002",   # Allow runtime imports in tests (needed for entity_registry, MockConfigEntry, etc.)
    "TC003",   # Allow runtime Path import in tests
    "PLC0415", # Allow imports inside tests to avoid circular imports
    "PLR0913", # Parametrize fixtures in exec command capture tests
]
"custom_components/bravia_quad/__init__.py" = ["TC001"]
"custom_components/bravia_quad/grpc/bravia_control_pb2.py" = ["ALL"]
"custom_components/bravia_quad/grpc/bravia_control_pb2_grpc.py" = ["ALL"]
"custom_components/bravia_quad/grpc/*.py" = ["ALL"]
"custom_components/bravia_quad/bravia_grpc_client.py" = ["ALL"]
"custom_components/bravia_quad/grpc_*.py" = ["ALL"]
"custom_components/bravia_quad/grpc_mapping.py" = ["ALL"]
"custom_components/bravia_quad/button.py" = ["S101", "D107"]
"custom_components/bravia_quad/media_player.py" = ["S101", "PLC0415"]
"custom_components/bravia_quad/number.py" = ["S101", "PLC0415"]
"custom_components/bravia_quad/select.py" = ["S101", "PLC0415"]
"custom_components/bravia_quad/sensor.py" = ["S101", "PLC0415"]
"custom_components/bravia_quad/switch.py" = ["S101", "PLC0415"]
"custom_components/bravia_quad/external_control.py" = ["E501"]
"custom_components/bravia_quad/transport.py" = ["PLR2004"]
"custom_components/bravia_quad/helpers.py" = ["SLF001", "PLC0415", "D102", "D107"]
"scripts/grpc/get_session_keys.py" = ["ALL"]
